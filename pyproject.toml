[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "freeman"
version = "1.2.0"
description = "Domain-agnostic world simulator for LLM agents."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "networkx>=3.2",
    "numpy>=1.26",
    "PyYAML>=6.0",
    "scipy>=1.11",
    "pytest>=8.0",
]

[project.optional-dependencies]
semantic = ["chromadb>=0.5"]
benchmark = [
    "chromadb>=0.5",
    "pandas>=2.2",
    "tqdm>=4.66",
]

[project.scripts]
freeman = "freeman.interface.cli:main"

[tool.setuptools]
include-package-data = true

[tool.setuptools.packages.find]
include = ["freeman*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
