name: Freeman Lite Tests

on:
  push:
    branches:
      - main
      - freeman-lite
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install package
        run: |
          python -m pip install -e ".[dev]"

      - name: Run test suite
        run: PYTHONPATH=. pytest tests_lite -q

      - name: Build release artifacts
        run: |
          python -m pip install build
          python -m build --sdist --wheel --outdir /tmp/freeman-lite-dist .
