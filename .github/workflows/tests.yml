name: Tests

on:
  push:
    branches:
      - main
      - hive_mind
  pull_request:
    branches:
      - hive_mind

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hive-mind-coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Freeman and hive test tooling
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install "numpy<2.0" pytest-cov

      - name: Run hive_mind tests with coverage gate
        env:
          OPENAI_API_KEY: ""
          LLM_API_KEY: ""
        run: |
          PYTHONPATH=. pytest tests/test_hive_mind.py \
            --cov=freeman.runtime.hive_runtime \
            --cov-report=term-missing \
            --cov-fail-under=80

  pytest:
    runs-on: ubuntu-latest
    needs: hive-mind-coverage
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Freeman and connectors
        run: |
          python -m pip install -e ".[dev,semantic,causal,benchmark]"
          python -m pip install -e ./packages/freeman-connectors

      - name: Run test suite
        run: PYTHONPATH=. pytest -q

  smoke-e2e:
    runs-on: ubuntu-latest
    needs: pytest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Freeman and connectors
        run: |
          python -m pip install -e ".[dev,semantic,causal,benchmark]"
          python -m pip install -e ./packages/freeman-connectors

      - name: Seed runtime artifacts for CLI smoke tests
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import yaml

          from freeman.agent.analysispipeline import AnalysisPipeline
          from freeman.agent.forecastregistry import ForecastRegistry
          from freeman.game.runner import SimConfig
          from freeman.memory.knowledgegraph import KnowledgeGraph
          from tests.conftest import build_water_market_schema

          root = Path("/tmp/freeman-smoke").resolve()
          runtime_path = root / "runtime"
          runtime_path.mkdir(parents=True, exist_ok=True)
          kg_path = root / "kg.json"
          config_path = root / "config.yaml"
          config_path.write_text(
              yaml.safe_dump(
                  {
                      "llm": {
                          "provider": "none",
                      },
                      "memory": {
                          "json_path": str(kg_path),
                          "embedding_provider": "hashing",
                          "hashing_embedding_dimension": 64,
                          "retrieval_top_k": 5,
                          "max_context_nodes": 10,
                      },
                      "runtime": {
                          "runtime_path": str(runtime_path),
                          "event_log_path": str(runtime_path / "event_log.jsonl"),
                      },
                      "sim": {"max_steps": 2, "seed": 11},
                  },
                  sort_keys=False,
              ),
              encoding="utf-8",
          )
          registry = ForecastRegistry(json_path=runtime_path / "forecasts.json", auto_load=False, auto_save=True)
          kg = KnowledgeGraph(json_path=kg_path, auto_load=False, auto_save=True)
          pipeline = AnalysisPipeline(
              knowledge_graph=kg,
              forecast_registry=registry,
              sim_config=SimConfig(max_steps=2, seed=11),
              config_path=config_path,
          )
          result = pipeline.run(build_water_market_schema(), session_log=None)
          kg.save()
          (runtime_path / "world_state.json").write_text(
              json.dumps(result.world.snapshot(), indent=2, sort_keys=True),
              encoding="utf-8",
          )
          (runtime_path / "pending_signals.json").write_text(
              json.dumps({"signals": []}, indent=2, sort_keys=True),
              encoding="utf-8",
          )
          (runtime_path / "event_log.jsonl").write_text("", encoding="utf-8")
          (root / "scenario_policies.json").write_text(
              json.dumps(
                  [{"actor_id": "country_a", "actions": {"water_release": 1.0}}],
                  indent=2,
                  sort_keys=True,
              ),
              encoding="utf-8",
          )
          PY

      - name: Smoke test CLI query / ask / what-if
        run: |
          freeman query --config /tmp/freeman-smoke/config.yaml --text "water crisis" --limit 3 > /tmp/freeman-smoke/query.json
          freeman ask --config /tmp/freeman-smoke/config.yaml "What is the current water crisis outlook?" --limit 3 > /tmp/freeman-smoke/ask.json
          freeman what-if --config /tmp/freeman-smoke/config.yaml "What if Country A increases water releases?" --policies-path /tmp/freeman-smoke/scenario_policies.json --max-steps 3 --limit 3 > /tmp/freeman-smoke/what_if.json
          python - <<'PY'
          from pathlib import Path
          import json

          root = Path("/tmp/freeman-smoke")
          query = json.loads((root / "query.json").read_text(encoding="utf-8"))
          ask = json.loads((root / "ask.json").read_text(encoding="utf-8"))
          what_if = json.loads((root / "what_if.json").read_text(encoding="utf-8"))

          assert query["semantic"] is True
          assert "matches" in query
          assert "answer_generated" in ask
          assert "matched" in ask
          assert "scenario_simulation" in what_if
          assert "baseline_simulation" in what_if
          assert "comparison" in what_if
          PY

  build:
    runs-on: ubuntu-latest
    needs:
      - pytest
      - smoke-e2e

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Build release artifacts
        run: |
          python -m pip install build
          python -m build --sdist --wheel --outdir dist .
          python -m build --sdist --wheel --outdir packages/freeman-connectors/dist packages/freeman-connectors

      - name: Upload core artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freeman-dist
          path: dist/*

      - name: Upload connectors artifacts
        uses: actions/upload-artifact@v4
        with:
          name: freeman-connectors-dist
          path: packages/freeman-connectors/dist/*
