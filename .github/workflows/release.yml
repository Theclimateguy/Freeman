name: Release

on:
  push:
    tags:
      - "hive_mind-*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install Freeman and connectors
        run: |
          python -m pip install -e ".[dev,semantic,causal,benchmark]"
          python -m pip install -e ./packages/freeman-connectors

      - name: Run full test suite
        run: PYTHONPATH=. pytest -q

      - name: Seed runtime artifacts for release smoke test
        run: |
          python - <<'PY'
          from pathlib import Path
          import json
          import yaml

          from freeman.agent.analysispipeline import AnalysisPipeline
          from freeman.agent.forecastregistry import ForecastRegistry
          from freeman.game.runner import SimConfig
          from freeman.memory.knowledgegraph import KnowledgeGraph
          from tests.conftest import build_water_market_schema

          root = Path("/tmp/freeman-release-smoke").resolve()
          runtime_path = root / "runtime"
          runtime_path.mkdir(parents=True, exist_ok=True)
          kg_path = root / "kg.json"
          config_path = root / "config.yaml"
          config_path.write_text(
              yaml.safe_dump(
                  {
                      "llm": {
                          "provider": "none",
                      },
                      "memory": {
                          "json_path": str(kg_path),
                          "embedding_provider": "hashing",
                          "hashing_embedding_dimension": 64,
                      },
                      "runtime": {
                          "runtime_path": str(runtime_path),
                          "event_log_path": str(runtime_path / "event_log.jsonl"),
                      },
                      "sim": {"max_steps": 2, "seed": 11},
                  },
                  sort_keys=False,
              ),
              encoding="utf-8",
          )
          registry = ForecastRegistry(json_path=runtime_path / "forecasts.json", auto_load=False, auto_save=True)
          kg = KnowledgeGraph(json_path=kg_path, auto_load=False, auto_save=True)
          pipeline = AnalysisPipeline(
              knowledge_graph=kg,
              forecast_registry=registry,
              sim_config=SimConfig(max_steps=2, seed=11),
              config_path=config_path,
          )
          result = pipeline.run(build_water_market_schema(), session_log=None)
          kg.save()
          (runtime_path / "world_state.json").write_text(
              json.dumps(result.world.snapshot(), indent=2, sort_keys=True),
              encoding="utf-8",
          )
          (runtime_path / "pending_signals.json").write_text(
              json.dumps({"signals": []}, indent=2, sort_keys=True),
              encoding="utf-8",
          )
          (runtime_path / "event_log.jsonl").write_text("", encoding="utf-8")
          (root / "scenario_policies.json").write_text(
              json.dumps(
                  [{"actor_id": "country_a", "actions": {"water_release": 1.0}}],
                  indent=2,
                  sort_keys=True,
              ),
              encoding="utf-8",
          )
          PY

      - name: Run release smoke test
        run: |
          freeman ask --config /tmp/freeman-release-smoke/config.yaml "What is the current water crisis outlook?" --limit 3 > /tmp/freeman-release-smoke/ask.json
          freeman what-if --config /tmp/freeman-release-smoke/config.yaml "What if Country A increases water releases?" --policies-path /tmp/freeman-release-smoke/scenario_policies.json --max-steps 3 --limit 3 > /tmp/freeman-release-smoke/what_if.json
          python - <<'PY'
          from pathlib import Path
          import json

          root = Path("/tmp/freeman-release-smoke")
          ask = json.loads((root / "ask.json").read_text(encoding="utf-8"))
          what_if = json.loads((root / "what_if.json").read_text(encoding="utf-8"))

          assert "matched" in ask
          assert "answer_generated" in ask
          assert "scenario_simulation" in what_if
          assert "baseline_simulation" in what_if
          assert "comparison" in what_if
          PY

      - name: Build release artifacts
        run: |
          python -m pip install build
          python -m build --sdist --wheel --outdir dist .
          python -m build --sdist --wheel --outdir packages/freeman-connectors/dist packages/freeman-connectors

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          gh release view "$tag" >/dev/null 2>&1 || gh release create "$tag" --title "$tag" --notes "Automated release for $tag"
          gh release upload "$tag" dist/* packages/freeman-connectors/dist/* --clobber
