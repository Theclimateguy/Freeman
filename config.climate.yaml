# Example config for testing the generic daemon runtime on climate RSS streams.
agent:
  source_refresh_seconds: 600
  bootstrap:
    mode: "llm_synthesize"
    schema_path:
    fallback_schema_path: "./freeman/domain/profiles/gim15.json"
    domain_brief_path: "./examples/domain_brief_climate_news.md"
    domain_brief: ""
    max_retries: 10
    trial_steps: 3
  stream_keywords:
    - climate
    - global warming
    - emissions
    - co2
    - methane
    - temperature
    - ipcc
    - sea level
    - extreme weather
    - transition risk
    - physical risk
    - disclosure
    - resilience
    - adaptation
    - mitigation
  stream_filter:
    min_keyword_matches: 2
    min_relevance_score: 0.10
    agent_min_relevance_score: 0.25
  sources:
    - type: rss
      url: "https://www.noaa.gov/rss.xml"
      default_topic: "climate_news"
      max_entries: 25
      source_type: "rss_noaa"
    - type: rss
      url: "https://yaleclimateconnections.org/feed/"
      default_topic: "climate_news"
      max_entries: 25
      source_type: "rss_yale_climate_connections"
    - type: rss
      url: "https://insideclimatenews.org/feed/"
      default_topic: "climate_news"
      max_entries: 25
      source_type: "rss_inside_climate_news"
    - type: rss
      url: "https://www.climatechangenews.com/feed/"
      default_topic: "climate_news"
      max_entries: 25
      source_type: "rss_climate_home_news"
    - type: rss
      url: "https://www.theguardian.com/environment/rss"
      default_topic: "climate_news"
      max_entries: 20
      source_type: "rss_guardian_environment"
    - type: rss
      url: "https://grist.org/feed/"
      default_topic: "climate_news"
      max_entries: 20
      source_type: "rss_grist"
    - type: rss
      url: "https://www.ecowatch.com/feed"
      default_topic: "climate_news"
      max_entries: 20
      source_type: "rss_ecowatch"
    - type: rss
      url: "https://floodlist.com/feed"
      default_topic: "physical_risk_news"
      max_entries: 20
      source_type: "rss_floodlist"
    - type: rss
      url: "https://atmosphere.copernicus.eu/rss.xml"
      default_topic: "climate_science"
      max_entries: 20
      source_type: "rss_copernicus"
    - type: rss
      url: "https://www.gdacs.org/xml/rss.xml"
      default_topic: "disaster_alert"
      max_entries: 20
      source_type: "rss_gdacs"
    - type: arxiv
      query: 'all:"climate change" OR all:"global warming"'
      default_topic: "climate_research"
      max_entries: 15
      max_results: 15
      sort_by: "submittedDate"
      sort_order: "descending"
      source_type: "arxiv_climate_change"
    - type: arxiv
      query: 'all:"extreme event attribution" OR all:"physical climate risk"'
      default_topic: "climate_research"
      max_entries: 15
      max_results: 15
      sort_by: "submittedDate"
      sort_order: "descending"
      source_type: "arxiv_physical_risk"
    - type: arxiv
      query: 'all:"transition risk" OR all:"climate finance"'
      default_topic: "climate_finance_research"
      max_entries: 15
      max_results: 15
      sort_by: "submittedDate"
      sort_order: "descending"
      source_type: "arxiv_transition_risk"
    - type: http_json
      url: "https://eonet.gsfc.nasa.gov/api/v3/events?status=all&limit=25"
      item_path: "events"
      default_topic: "physical_risk_news"
      source_type: "http_eonet_events"
      field_map:
        signal_id: "id"
        text: "title"
        timestamp: "geometry.0.date"
        entities: "categories.0.title"
      static_metadata:
        provenance: "NASA EONET"
    - type: http_json
      url: "https://api.gdeltproject.org/api/v2/doc/doc"
      params:
        query: "climate change OR global warming"
        mode: "ArtList"
        maxrecords: 25
        format: "json"
      item_path: "articles"
      default_topic: "climate_news"
      source_type: "http_gdelt_climate"
      field_map:
        signal_id: "url"
        text: "title"
        timestamp: "seendate"
        entities: "domain"
      static_metadata:
        provenance: "GDELT DOC 2.0"
    - type: http_json
      url: "https://api.gdeltproject.org/api/v2/doc/doc"
      params:
        query: "\"extreme weather\" OR flood OR wildfire OR drought"
        mode: "ArtList"
        maxrecords: 25
        format: "json"
      item_path: "articles"
      default_topic: "physical_risk_news"
      source_type: "http_gdelt_extremes"
      field_map:
        signal_id: "url"
        text: "title"
        timestamp: "seendate"
        entities: "domain"
      static_metadata:
        provenance: "GDELT DOC 2.0"

llm:
  provider: "ollama"
  model: "qwen2.5-coder:14b"
  base_url: "http://127.0.0.1:11434"
  timeout_seconds: 120.0

memory:
  backend: "networkx-json"
  json_path: "./data/kg_climate.json"
  embedding_provider: "hashing"
  hashing_embedding_dimension: 384
  reconciler:
    merge_threshold: 0.82
    compaction_interval: 20

runtime:
  mode: "follow"
  poll_interval_seconds: 600
  checkpoint_every_n_events: 25
  checkpoint_every_n_seconds: 300
  runtime_path: "./data/runtime_climate"
  event_log_path: "./data/runtime_climate/event_log.jsonl"
  kg_snapshots:
    enabled: true
    path: "./data/runtime_climate/kg_snapshots"
    max_snapshots: 0
  resume_on_start: true

sim:
  max_steps: 12
  dt: 1.0
  level2_check_every: 5
  level2_shock_delta: 0.01
  stop_on_hard_level2: true
  convergence_check_steps: 20
  convergence_epsilon: 1.0e-4
  fixed_point_max_iter: 20
  fixed_point_alpha: 0.1
  seed: 42
