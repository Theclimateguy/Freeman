# Example config for testing the generic daemon runtime on climate RSS streams.
agent:
  source_refresh_seconds: 600
  bootstrap:
    mode: "llm_synthesize"
    schema_path:
    fallback_schema_path: "./freeman/domain/profiles/gim15.json"
    domain_brief_path: "./examples/domain_brief_climate_news.md"
    domain_brief: ""
    max_retries: 10
    trial_steps: 3
  stream_keywords:
    - climate
    - emissions
    - co2
    - temperature
    - ipcc
    - sea level
    - extreme weather
    - adaptation
    - mitigation
  stream_filter:
    min_keyword_matches: 2
    min_relevance_score: 0.10
    agent_min_relevance_score: 0.25
  sources:
    - type: rss
      url: "https://www.carbonbrief.org/feed/"
      default_topic: "climate_news"
      max_entries: 25
      source_type: "rss_carbonbrief"
    - type: rss
      url: "https://www.noaa.gov/rss.xml"
      default_topic: "climate_news"
      max_entries: 25
      source_type: "rss_noaa"

llm:
  provider: "ollama"
  model: "qwen2.5-coder:14b"
  base_url: "http://127.0.0.1:11434"
  timeout_seconds: 120.0

memory:
  backend: "networkx-json"
  json_path: "./data/kg_climate.json"
  embedding_provider: "hashing"
  hashing_embedding_dimension: 384
  reconciler:
    merge_threshold: 0.82
    compaction_interval: 20

runtime:
  mode: "follow"
  poll_interval_seconds: 600
  checkpoint_every_n_events: 25
  checkpoint_every_n_seconds: 300
  runtime_path: "./data/runtime_climate"
  event_log_path: "./data/runtime_climate/event_log.jsonl"
  resume_on_start: true

sim:
  max_steps: 12
  dt: 1.0
  level2_check_every: 5
  level2_shock_delta: 0.01
  stop_on_hard_level2: true
  convergence_check_steps: 20
  convergence_epsilon: 1.0e-4
  fixed_point_max_iter: 20
  fixed_point_alpha: 0.1
  seed: 42
